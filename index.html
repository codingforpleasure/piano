<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#15130f">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Optical Piano</title>
<style>
  :root {
    --bg: #15130f;
    --panel: #1e1b16;
    --panel-2: #262218;
    --line: #3a352b;
    --text: #f0ead9;
    --dim: #9a917d;
    --amber: #ffb63d;
    --amber-deep: #8a5a10;
    --teal: #3fd0a4;
    --red: #e2635a;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
    max-width: 560px; margin: 0 auto;
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
    gap: 10px;
    user-select: none; -webkit-user-select: none;
  }
  header { display: flex; align-items: baseline; justify-content: space-between; padding: 2px 2px 0; }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.06em; }
  h1 span { color: var(--amber); }
  #status {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    padding: 4px 9px; border-radius: 99px; border: 1px solid var(--line); color: var(--dim);
  }
  #status.live { color: var(--teal); border-color: var(--teal); }
  #status.cal  { color: var(--amber); border-color: var(--amber); }

  #stage {
    position: relative; background: #000; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--line); aspect-ratio: 4 / 3;
  }
  #view { width: 100%; height: 100%; display: block; }
  #prompt {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; text-align: center;
    background: rgba(21,19,15,0.92); padding: 24px;
  }
  #prompt p { color: var(--dim); font-size: 14px; line-height: 1.5; max-width: 320px; }
  #guide {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    font-size: 14px; line-height: 1.4; min-height: 44px;
  }
  #guide b { color: var(--amber); }

  #keys { display: flex; gap: 4px; height: 92px; }
  .key {
    flex: 1; position: relative; border-radius: 6px; overflow: hidden;
    background: var(--panel); border: 1px solid var(--line);
    display: flex; align-items: flex-end; justify-content: center;
    transition: border-color 80ms;
  }
  .key .fill {
    position: absolute; left: 0; right: 0; bottom: 0; height: 0%;
    background: var(--amber-deep); transition: height 60ms linear;
  }
  .key.on { border-color: var(--amber); }
  .key.on .fill { background: var(--amber); }
  .key .lbl {
    position: relative; font-family: var(--mono); font-size: 11px;
    color: var(--dim); padding-bottom: 6px;
  }
  .key.on .lbl { color: #241a05; font-weight: 700; }
  .key.uncal { opacity: 0.35; }
  .key.hit::after {
    content: ""; position: absolute; top: 4px; right: 4px;
    width: 7px; height: 7px; border-radius: 50%; background: var(--teal);
  }
  .key.hit .lbl { color: var(--teal); }

  #controls { display: flex; flex-direction: column; gap: 10px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row label { font-size: 13px; color: var(--dim); min-width: 84px; }
  .row output { font-family: var(--mono); font-size: 12px; color: var(--text); min-width: 30px; text-align: right; }
  input[type=range] { flex: 1; accent-color: var(--amber); height: 28px; }
  select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font-size: 14px;
  }
  button {
    font: inherit; font-weight: 600; border: none; border-radius: 10px;
    padding: 13px 18px; cursor: pointer; touch-action: manipulation;
  }
  .primary { background: var(--amber); color: #241a05; }
  .primary:active { filter: brightness(0.9); }
  .ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); padding: 10px 14px; font-weight: 500; font-size: 14px; }
  .btnrow { display: flex; gap: 8px; }
  .btnrow .primary { flex: 1; }
  #err { color: var(--red); font-size: 13px; line-height: 1.4; display: none; padding: 0 2px; }

  #capture { display: none; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
  #capture h2 { font-size: 13px; color: var(--dim); font-weight: 600; letter-spacing: 0.04em; margin-bottom: 8px; }
  #shots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  #shots a { position: relative; display: block; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
  #shots img { width: 100%; height: auto; display: block; }
  #shots span { position: absolute; top: 2px; left: 4px; font: 700 10px var(--mono); color: var(--amber); text-shadow: 0 0 3px #000; }
  #clip { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  #clip video { width: 100%; border-radius: 8px; background: #000; }
  #capture .save { align-self: flex-start; background: var(--amber); color: #241a05; font-weight: 600; text-decoration: none; border: none; cursor: pointer; border-radius: 8px; padding: 8px 14px; font-size: 13px; }
  #saveAll { display: inline-block; margin-bottom: 10px; }
  #capture .hint { font-size: 11px; color: var(--dim); margin-top: 8px; }

  footer { font-size: 11px; color: var(--dim); text-align: center; font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <h1>OPTICAL<span>—</span>PIANO</h1>
  <div id="status">off</div>
</header>

<div id="stage">
  <canvas id="view" width="640" height="480"></canvas>
  <div id="guide"></div>
  <div id="prompt">
    <p>Tap start, then tap Calibrate and close the phone in the box (camera facing the holes). Calibration begins after a 10-second countdown.</p>
    <button class="primary" id="startBtn">Start camera &amp; sound</button>
  </div>
</div>

<div id="keys"></div>

<div id="controls">
  <div class="row">
    <label for="numKeys">Keys</label>
    <select id="numKeys">
      <option>3</option><option>4</option><option>5</option><option>6</option>
      <option>7</option><option>8</option><option selected>10</option>
    </select>
    <button class="ghost" id="toneBtn" type="button">Test sound</button>
  </div>
  <div class="row">
    <label for="sens">Sensitivity</label>
    <input type="range" id="sens" min="8" max="60" value="46">
    <output id="sensOut">46</output>
  </div>
  <div class="btnrow">
    <button class="primary" id="calBtn" disabled>Calibrate</button>
  </div>
</div>

<div id="err"></div>
<div id="capture"></div>
<footer>keep the room lit · keep the box dark · v0.1 shoebox</footer>

<script>
"use strict";
/* ============================================================================
   OPTICAL PIANO — single-file PWA. Sections in order:
     1. constants   2. state      3. dom        4. audio
     5. key strip   6. camera     7. pixels     8. calibration
     9. play detect 10. render    11. main loop 12. wiring
   ========================================================================== */

/* ---------- 1. constants ---------- */
const PW = 160, PH = 120;               // processing resolution
const NAMES = ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5"];
const FREQS = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25];
const BLOB_DIFF = 26;                    // per-pixel diff for calibration blobs
const BLOB_MIN  = 10;                    // min changed pixels to accept a blob
const EMA_ALPHA = 0.03;                  // baseline drift speed while idle
const REMOVE_DELTA = 40;                 // whole-frame brightening that means "lifted out of the box"

/* ---------- 2. state ---------- */
let mode = "idle";                       // idle | baseline | calibrate | play
let numKeys = 10;
let zones = [];                          // {x,y,w,h, base, sig, pressed, note, freq, name}
let calIndex = 0, calHold = 0, calRelease = 0, baseFrames = 0;
let baselineFrame = new Float32Array(PW * PH);
let tOn = 22, tOff = 10;
let reachedOrder = [];                    // note indices reached this session, in order
let darkMean = 0;                         // mean frame luma inside the closed box (removal reference)

/* ---------- 3. dom ---------- */
const $ = id => document.getElementById(id);
const view = $("view"), vctx = view.getContext("2d");
const proc = document.createElement("canvas"); proc.width = PW; proc.height = PH;
const pctx = proc.getContext("2d", { willReadFrequently: true });
const video = document.createElement("video");
video.playsInline = true; video.muted = true;
const statusEl = $("status"), guideEl = $("guide"), errEl = $("err");

function setStatus(txt, cls) { statusEl.textContent = txt; statusEl.className = cls || ""; }
function setGuide(html) { guideEl.innerHTML = html; }
function showErr(msg) { errEl.style.display = "block"; errEl.textContent = msg; }

/* ---------- 4. audio ---------- */
let actx = null, master = null;
const voices = [];

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: "interactive" });
  master = actx.createGain();
  master.gain.value = 0.5;
  master.connect(actx.destination);
}
function makeVoice(freq) {
  const g = actx.createGain(); g.gain.value = 0; g.connect(master);
  const o1 = actx.createOscillator(); o1.type = "triangle"; o1.frequency.value = freq;
  const o2 = actx.createOscillator(); o2.type = "sine"; o2.frequency.value = freq * 2.001;
  const g2 = actx.createGain(); g2.gain.value = 0.25;
  o1.connect(g); o2.connect(g2); g2.connect(g);
  o1.start(); o2.start();
  return { g };
}
function noteOn(i) {
  const v = voices[i]; if (!v) return;
  const t = actx.currentTime;
  v.g.gain.cancelScheduledValues(t);
  v.g.gain.setValueAtTime(v.g.gain.value, t);
  v.g.gain.linearRampToValueAtTime(0.9 / Math.max(3, numKeys) * 3, t + 0.01);
}
function noteOff(i) {
  const v = voices[i]; if (!v) return;
  const t = actx.currentTime;
  v.g.gain.cancelScheduledValues(t);
  v.g.gain.setValueAtTime(v.g.gain.value, t);
  v.g.gain.exponentialRampToValueAtTime(0.0008, t + 0.3);
  v.g.gain.setValueAtTime(0, t + 0.32);
}
function blip(i, dur = 0.25) { noteOn(i); setTimeout(() => noteOff(i), dur * 1000); }
// Short UI beep, independent of the piano voices (used by the countdown).
function beep(freq = 880, dur = 0.08, vol = 0.3) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = "square"; o.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.02);
}
// Distinct rising cue: the countdown finished, calibration is starting now.
function beepStart() {
  beep(660, 0.1);
  setTimeout(() => beep(990, 0.1), 120);
  setTimeout(() => beep(1320, 0.18), 240);
}
function rebuildVoices() {
  voices.length = 0;
  for (let i = 0; i < numKeys; i++) voices.push(makeVoice(FREQS[i]));
}

/* ---------- 5. key strip ---------- */
const keysEl = $("keys");
let keyEls = [];
function buildKeyStrip() {
  keysEl.innerHTML = "";
  keyEls = [];
  for (let i = 0; i < numKeys; i++) {
    const k = document.createElement("div");
    k.className = "key uncal";
    k.innerHTML = `<div class="fill"></div><div class="lbl">${NAMES[i]}</div>`;
    k.addEventListener("pointerdown", () => { if (actx) blip(i); });
    keysEl.appendChild(k);
    keyEls.push(k);
  }
}

/* ---------- 6. camera ---------- */
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showErr("Camera API unavailable. Open this page over HTTPS (e.g. a Netlify or GitHub Pages link) — camera access is blocked on plain file:// or http://.");
    return false;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 60 } }
    });
    video.srcObject = stream;
    await video.play();
    // Note: no manual exposure lock — locking to "manual" without an exposureTime
    // blacks the image out instantly on many devices. Auto-exposure is fine for a
    // stable box; the drift-compensating baseline (EMA_ALPHA) absorbs slow changes.
    return true;
  } catch (e) {
    showErr("Camera permission denied or unavailable: " + e.message);
    return false;
  }
}
async function keepAwake() {
  try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch (_) {}
}
document.addEventListener("visibilitychange", () => { if (!document.hidden) keepAwake(); });

/* ---------- 7. pixel helpers ---------- */
function grabFrame() {
  pctx.drawImage(video, 0, 0, PW, PH);
  return pctx.getImageData(0, 0, PW, PH).data;
}
function lumaAt(d, p) { const q = p * 4; return (2 * d[q] + 5 * d[q + 1] + d[q + 2]) >> 3; }
function zoneLuma(d, z) {
  let sum = 0, n = 0;
  for (let y = z.y; y < z.y + z.h; y++)
    for (let x = z.x; x < z.x + z.w; x++) { sum += lumaAt(d, y * PW + x); n++; }
  return n ? sum / n : 0;
}
function frameMeanLuma(d) {
  let sum = 0; const N = PW * PH;
  for (let p = 0; p < N; p++) sum += lumaAt(d, p);
  return sum / N;
}

/* ---------- 8. calibration ---------- */
function startCalibration() {
  zones = [];
  reachedOrder = [];
  calIndex = 0; baseFrames = 0;
  baselineFrame.fill(0);
  mode = "baseline";
  setStatus("calibrating", "cal");
  keyEls.forEach(k => k.className = "key uncal");
  setGuide("Hold still — learning the dark box…");
}

/* Auto-calibrate countdown: gives you time to close the phone in the box. */
let countdownTimer = null;
function cancelCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}
function startCountdown(secs = 10) {
  cancelCountdown();
  let left = secs;
  const tick = () => {
    setGuide(`Close the phone in the box — calibrating in <b>${left}</b>s…`);
    beep(left <= 3 ? 1320 : 880, 0.07);    // higher, more urgent in the final 3 seconds
  };
  setStatus("closing…", "cal");
  tick();
  countdownTimer = setInterval(() => {
    if (--left > 0) { tick(); return; }
    cancelCountdown();
    beepStart();                           // audible "starting now" cue
    startCalibration();                    // box is dark by now → baseline learns correctly
    startCapture();                        // photos every second + footage, through calibration
  }, 1000);
}
function calibrationStep(d) {
  if (mode === "baseline") {
    for (let p = 0; p < PW * PH; p++) baselineFrame[p] += lumaAt(d, p);
    if (++baseFrames >= 30) {
      for (let p = 0; p < PW * PH; p++) baselineFrame[p] /= 30;
      mode = "calibrate"; calHold = 0; calRelease = 0;
      setGuide(`Press key <b>1</b> and hold briefly.`);
    }
    return;
  }
  // find blob of brightened pixels
  let minx = PW, miny = PH, maxx = -1, maxy = -1, count = 0;
  for (let y = 0; y < PH; y++) for (let x = 0; x < PW; x++) {
    const p = y * PW + x;
    if (lumaAt(d, p) - baselineFrame[p] > BLOB_DIFF) {
      count++;
      if (x < minx) minx = x; if (x > maxx) maxx = x;
      if (y < miny) miny = y; if (y > maxy) maxy = y;
    }
  }
  if (calRelease > 0) {                        // waiting for previous key to close
    if (count < BLOB_MIN / 2 && ++calHold >= 4) {
      calRelease = 0; calHold = 0;
      if (calIndex >= numKeys) { enterPlay(); return; }
      setGuide(`Press key <b>${calIndex + 1}</b> and hold briefly.`);
    } else if (count >= BLOB_MIN) calHold = 0;
    return;
  }
  if (count >= BLOB_MIN) {
    if (++calHold >= 3) {                      // stable for 3 frames -> register
      const pad = 2;
      const z = {
        x: Math.max(0, minx - pad), y: Math.max(0, miny - pad),
        w: Math.min(PW - 1, maxx + pad) - Math.max(0, minx - pad) + 1,
        h: Math.min(PH - 1, maxy + pad) - Math.max(0, miny - pad) + 1,
        base: 0, sig: 0, pressed: false,
        note: calIndex, freq: FREQS[calIndex], name: NAMES[calIndex]
      };
      const cx = z.x + z.w / 2, cy = z.y + z.h / 2;
      const dup = zones.some(o => cx >= o.x && cx <= o.x + o.w && cy >= o.y && cy <= o.y + o.h);
      if (!dup) {
        zones.push(z);
        keyEls[calIndex].classList.remove("uncal");
        blip(calIndex);
        calIndex++; calHold = 0; calRelease = 1;
        setGuide(calIndex >= numKeys
          ? `Release — all <b>${numKeys}</b> keys learned!`
          : `Got it. Release key <b>${calIndex}</b>…`);
      } else { calHold = 0; }
    }
  } else calHold = 0;
}
function enterPlay() {
  mode = "play";
  setStatus("live", "live");
  setGuide(`Play! Lift the phone out of the box to see which keys were reached.`);
  const d = grabFrame();
  zones.forEach(z => { z.base = zoneLuma(d, z); z.pressed = false; });
  darkMean = frameMeanLuma(d);              // brightness reference of the closed, dark box
  clearReached();
}

/* Latch a key as "reached" (persists until the next calibration). */
function recordReached(note) {
  if (reachedOrder.includes(note)) return;
  reachedOrder.push(note);
  keyEls[note]?.classList.add("hit");
}
function clearReached() {
  reachedOrder = [];
  keyEls.forEach(k => k.classList.remove("hit"));
}

/* Phone lifted out of the box: freeze so the flood of light can't overwrite the
   record, silence everything, and show which keys were reached. */
function handleRemoval() {
  mode = "removed";
  zones.forEach(z => { if (z.pressed) noteOff(z.note); z.pressed = false; });
  keyEls.forEach(k => { k.classList.remove("on"); const f = k.querySelector(".fill"); if (f) f.style.height = "0%"; });
  setStatus("out of box");
  const list = reachedOrder.length ? reachedOrder.map(n => NAMES[n]).join(" → ") : "none";
  setGuide(`Out of the box — keys reached: <b>${list}</b>. Tap <b>Calibrate</b> to run again.`);
}

/* ---------- 8b. diagnostic capture (photos + video during calibration) ---------- */
const CAP_SECONDS = 15;
const shot = document.createElement("canvas");
const shotCtx = shot.getContext("2d");
let capTimer = null, capShots = 0, recorder = null, recChunks = [];
const photos = [];                                 // { name, data:Uint8Array } for the zip

function startCapture() {
  // stop anything already running, reset the gallery
  if (capTimer) clearInterval(capTimer);
  stopRecording();
  capShots = 0;
  photos.length = 0;
  const gal = $("capture");
  gal.style.display = "block";
  gal.innerHTML = `<h2>CAPTURE — ${CAP_SECONDS} photos + footage</h2>` +
    `<button id="saveAll" class="save" type="button">Save all photos (.zip)</button>` +
    `<div id="shots"></div>`;
  $("saveAll").addEventListener("click", saveAllPhotos);

  captureFrame();                                  // first photo at t=0
  capTimer = setInterval(() => {
    captureFrame();
    if (++capShots >= CAP_SECONDS - 1) { clearInterval(capTimer); capTimer = null; }
  }, 1000);

  startRecording();
  setTimeout(stopRecording, CAP_SECONDS * 1000);
}

function captureFrame() {
  const w = video.videoWidth || 640, h = video.videoHeight || 480;
  shot.width = w; shot.height = h;
  shotCtx.drawImage(video, 0, 0, w, h);            // full-res, exactly what the camera sees
  const url = shot.toDataURL("image/jpeg", 0.85);
  const n = document.querySelectorAll("#shots a").length + 1;
  const name = `frame-${String(n).padStart(2, "0")}.jpg`;
  photos.push({ name, data: dataUrlToBytes(url) });
  const a = document.createElement("a");
  a.href = url; a.download = name;
  a.title = `Photo ${n} — tap to save`;
  a.innerHTML = `<img src="${url}" alt="frame ${n}"><span>${n}</span>`;
  $("shots").appendChild(a);
}

/* Save every captured photo as one .zip (store method — JPEGs are already compressed).
   Built by hand so there's no external dependency and it works offline. */
function saveAllPhotos() {
  if (!photos.length) return;
  const blob = new Blob([buildZip(photos)], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "box-photos.zip";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function dataUrlToBytes(url) {
  const bin = atob(url.split(",")[1]);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function buildZip(files) {
  const u16 = v => new Uint8Array([v & 255, (v >> 8) & 255]);
  const u32 = v => new Uint8Array([v & 255, (v >> 8) & 255, (v >> 16) & 255, (v >>> 24) & 255]);
  const cat = arrs => {
    let len = 0; for (const a of arrs) len += a.length;
    const out = new Uint8Array(len);
    let p = 0; for (const a of arrs) { out.set(a, p); p += a.length; }
    return out;
  };
  const enc = new TextEncoder();
  const DOS_TIME = 0, DOS_DATE = ((2024 - 1980) << 9) | (1 << 5) | 1;   // valid stamp (2024-01-01)
  const locals = [], central = [];
  let offset = 0;
  for (const f of files) {
    const name = enc.encode(f.name), data = f.data, crc = crc32(data);
    const local = cat([
      u32(0x04034b50), u16(20), u16(0), u16(0), u16(DOS_TIME), u16(DOS_DATE),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), name, data
    ]);
    central.push(cat([
      u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(DOS_TIME), u16(DOS_DATE),
      u32(crc), u32(data.length), u32(data.length),
      u16(name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset), name
    ]));
    locals.push(local);
    offset += local.length;
  }
  const cd = cat(central);
  const end = cat([
    u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length),
    u32(cd.length), u32(offset), u16(0)
  ]);
  return cat([...locals, cd, end]);
}

function startRecording() {
  recChunks = [];
  const stream = video.srcObject;
  if (!stream || typeof MediaRecorder === "undefined") return;   // video is best-effort
  try {
    recorder = new MediaRecorder(stream, pickMime());
    recorder.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
    recorder.onstop = finishRecording;
    recorder.start();
  } catch (_) { recorder = null; }
}
function pickMime() {
  const types = ["video/mp4", "video/webm;codecs=vp9", "video/webm"];
  for (const t of types) if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) return { mimeType: t };
  return {};
}
function stopRecording() { if (recorder && recorder.state !== "inactive") recorder.stop(); }
function finishRecording() {
  if (!recChunks.length) return;
  const blob = new Blob(recChunks, { type: recChunks[0].type || "video/webm" });
  const url = URL.createObjectURL(blob);
  const ext = blob.type.includes("mp4") ? "mp4" : "webm";
  const wrap = document.createElement("div");
  wrap.id = "clip";
  wrap.innerHTML =
    `<video src="${url}" controls playsinline></video>` +
    `<a class="save" href="${url}" download="box-footage.${ext}">Save video</a>` +
    `<div class="hint">Tap any photo above to save it. Photos + video captured during calibration.</div>`;
  $("capture").appendChild(wrap);
}

/* ---------- 9. play-mode detection ---------- */
function playStep(d) {
  if (frameMeanLuma(d) > darkMean + REMOVE_DELTA) { handleRemoval(); return; }  // lifted out
  for (const z of zones) {
    const l = zoneLuma(d, z);
    z.sig = l - z.base;
    if (!z.pressed) {
      z.base += EMA_ALPHA * (l - z.base);      // drift-compensating baseline, frozen while pressed
      if (z.sig > tOn)  { z.pressed = true;  noteOn(z.note); recordReached(z.note); }
    } else if (z.sig < tOff) { z.pressed = false; noteOff(z.note); }
    const k = keyEls[z.note];
    if (k) {
      k.classList.toggle("on", z.pressed);
      k.querySelector(".fill").style.height =
        Math.max(0, Math.min(100, (z.sig / tOn) * 100)) + "%";
    }
  }
}

/* ---------- 10. render ---------- */
function render() {
  vctx.drawImage(video, 0, 0, view.width, view.height);
  const sx = view.width / PW, sy = view.height / PH;
  vctx.lineWidth = 2; vctx.font = "bold 15px ui-monospace, monospace";
  for (const z of zones) {
    vctx.strokeStyle = z.pressed ? "#ffb63d" : "rgba(240,234,217,0.45)";
    vctx.strokeRect(z.x * sx, z.y * sy, z.w * sx, z.h * sy);
    vctx.fillStyle = z.pressed ? "#ffb63d" : "rgba(240,234,217,0.7)";
    vctx.fillText(z.name, z.x * sx + 3, z.y * sy - 4);
  }
}

/* ---------- 11. main loop ---------- */
function loop() {
  if (video.readyState >= 2) {
    const d = grabFrame();
    if (mode === "baseline" || mode === "calibrate") calibrationStep(d);
    else if (mode === "play") playStep(d);
    render();
  }
  if (video.requestVideoFrameCallback) video.requestVideoFrameCallback(loop);
  else requestAnimationFrame(loop);
}

/* ---------- 12. wiring ---------- */
$("startBtn").addEventListener("click", async () => {
  initAudio();
  await actx.resume();
  rebuildVoices();
  const ok = await startCamera();
  if (!ok) return;
  $("prompt").style.display = "none";
  $("calBtn").disabled = false;
  keepAwake();
  setStatus("camera on");
  setGuide(`Tap <b>Calibrate</b> to start the 10-second countdown, then close the box.`);
  loop();
});
$("calBtn").addEventListener("click", () => startCountdown(10));   // countdown → auto-calibrates at 0
$("toneBtn").addEventListener("click", () => {
  if (!actx) return;
  [0, 2, 4].forEach((n, j) => setTimeout(() => blip(Math.min(n, numKeys - 1), 0.2), j * 160));
});
$("numKeys").addEventListener("change", e => {
  numKeys = +e.target.value;
  buildKeyStrip();
  if (actx) rebuildVoices();
  zones = [];
  cancelCountdown();
  if (mode === "play" || mode === "calibrate" || mode === "baseline") {
    mode = "idle"; setStatus("camera on");
    setGuide(`Key count changed — tap <b>Calibrate</b> again.`);
  }
});
$("sens").addEventListener("input", e => {
  // Slider reads as sensitivity (right = more sensitive), but the detector wants a
  // threshold (lower = more sensitive), so invert: tOn = min+max - value = 68 - value.
  const sens = +e.target.value;
  tOn = 68 - sens; tOff = Math.round(tOn * 0.45);
  $("sensOut").textContent = sens;
});

buildKeyStrip();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
</script>
</body>
